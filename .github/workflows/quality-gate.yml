name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run quality gate
        env:
          CLAUDE_DELEGATE_HEARTBEAT_SECONDS: "0"
        run: bash scripts/quality-gate.sh
